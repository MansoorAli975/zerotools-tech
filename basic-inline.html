<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <style>
        html,
        body,
        #zt_basic_embed_chat {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #zt_basic_embed_chat iframe {
            display: block !important;
            width: 100% !important;
            height: 100% !important;
            border: 0 !important;
        }
    </style>
</head>
<body>
    <div id="zt_basic_embed_chat"></div>
    <script>
        (function () {
            const visitorStorageKey = 'zt_webchat_visitor_id_v1';
            const bot = 'basic';
            const botPrefix = 'zt_basic';
            const signEndpoint = 'https://zt-uchat-sign.zerotools.workers.dev/';
            const embedScriptUrl = 'https://www.uchat.com.au/js/widget/jxjukkd1zbid1cea/embed.js?id=zt_basic_embed_chat';

            function createVisitorId() {
                if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                    return window.crypto.randomUUID();
                }

                return String(Date.now()) + '-' + Math.random().toString(36).slice(2);
            }

            function getVisitorId() {
                try {
                    let visitorId = window.localStorage.getItem(visitorStorageKey);

                    if (!visitorId) {
                        visitorId = createVisitorId();
                        window.localStorage.setItem(visitorStorageKey, visitorId);
                    }

                    return visitorId;
                } catch (error) {
                    return createVisitorId();
                }
            }

            async function getIdentifierHash(userId) {
                const url = signEndpoint + '?bot=' + encodeURIComponent(bot) + '&user_id=' + encodeURIComponent(userId);
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('Signing request failed with status ' + response.status);
                }

                const data = await response.json();

                if (!data.identifier_hash) {
                    throw new Error('Missing identifier_hash in signing response');
                }

                return data.identifier_hash;
            }

            function registerReadyListener(userId, identifierHash) {
                let customUserApplied = false;

                function handleChatbotReady() {
                    if (customUserApplied) return;

                    if (!identifierHash) {
                        console.warn('UChat custom user setup skipped because identifier_hash is not available');
                        window.removeEventListener('chatbot:ready', handleChatbotReady);
                        return;
                    }

                    if (window.$chatbot && typeof window.$chatbot.setUser === 'function') {
                        customUserApplied = true;
                        window.removeEventListener('chatbot:ready', handleChatbotReady);
                        window.$chatbot.setUser(userId, {
                            name: 'Zero Tools Demo Visitor',
                            identifier_hash: identifierHash
                        });
                    } else {
                        console.warn('UChat setUser function is not available');
                    }
                }

                window.addEventListener('chatbot:ready', handleChatbotReady);
            }

            function loadEmbedScript() {
                const script = document.createElement('script');
                script.src = embedScriptUrl;
                script.async = true;
                script.defer = true;
                document.body.appendChild(script);
            }

            async function prepareAndLoadChatbot() {
                const userId = botPrefix + '_' + getVisitorId();
                let identifierHash = null;

                try {
                    identifierHash = await getIdentifierHash(userId);
                } catch (error) {
                    console.warn('UChat custom user setup failed', error);
                }

                registerReadyListener(userId, identifierHash);

                // Loading without a signed user may reintroduce duplicate menu/session behavior,
                // but it keeps the inline chat visually available if signing is temporarily down.
                loadEmbedScript();
            }

            prepareAndLoadChatbot();
        }());
    </script>
</body>
</html>
