<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Zero Tools</title>
    <meta name="robots" content="noindex, follow">

    <style>
        :root {
            --white: #ffffff;
            --off-white: #f9fafb;
            --black: #111827;
            --dark-gray: #374151;
            --medium-gray: #e5e7eb;
            --brand-blue: #00A5E5;
            --brand-blue-hover: #008fc8;
            --border-radius: 14px;
            --shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0, 165, 229, 0.12), transparent 32%),
                linear-gradient(135deg, var(--off-white) 0%, var(--white) 100%);
            color: var(--dark-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }

        .not-found-card {
            width: min(100%, 680px);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--medium-gray);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 46px 34px;
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 26px;
            font-size: 0.92rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--brand-blue);
        }

        .error-code {
            font-size: clamp(4.5rem, 14vw, 7rem);
            line-height: 0.9;
            font-weight: 800;
            color: var(--black);
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--black);
            line-height: 1.1;
            margin-bottom: 16px;
        }

        p {
            max-width: 540px;
            margin: 0 auto 30px;
            font-size: 1.03rem;
            color: var(--dark-gray);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 34px;
        }

        .action-link {
            min-width: 160px;
            padding: 14px 20px;
            border-radius: var(--border-radius);
            font-size: 0.96rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .action-link-primary {
            background: var(--brand-blue);
            color: #ffffff;
            border: 1px solid var(--brand-blue);
        }

        .action-link-primary:hover {
            background: var(--brand-blue-hover);
            border-color: var(--brand-blue-hover);
            transform: translateY(-1px);
        }

        .action-link-secondary {
            background: #ffffff;
            color: var(--black);
            border: 1px solid var(--medium-gray);
        }

        .action-link-secondary:hover {
            border-color: var(--brand-blue);
            color: var(--brand-blue);
            transform: translateY(-1px);
        }

        .footer-note {
            margin: 0;
            font-size: 0.9rem;
            color: #6b7280;
        }

        @media (max-width: 560px) {
            .not-found-card {
                padding: 38px 22px;
                border-radius: 20px;
            }

            .actions {
                flex-direction: column;
                align-items: stretch;
            }

            .action-link {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="not-found-card">
        <div class="brand">Zero Tools</div>

        <div class="error-code">404</div>

        <h1>Page not found</h1>

        <p>
            The page you are looking for may have moved, or the link may be incorrect.
            You can return to the homepage or continue exploring the chatbot options.
        </p>

        <div class="actions" aria-label="Helpful links">
            <a class="action-link action-link-primary" href="index.html">Go to Home</a>
            <a class="action-link action-link-secondary" href="index.html#solutions">Compare Chatbots</a>
            <a class="action-link action-link-secondary" href="index.html#contact">Contact Zero Tools</a>
        </div>

        <p class="footer-note">© 2026 Zero Tools. All rights reserved.</p>
    </main>

</body>

</html>
