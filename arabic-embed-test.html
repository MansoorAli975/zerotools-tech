<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pro Arabic Embed Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f3fbff;
    }

    .test-card {
      width: min(420px, calc(100vw - 32px));
      height: 620px;
      background: white;
      border: 1px solid #d9e7ef;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    #embed_chatbot_container_id {
      height: 572px;
    }

    #embed_chatbot_container_id iframe {
      display: block !important;
    }
  </style>
</head>
<body>
  <main class="test-card">
    <h1>Pro Arabic Embed Test</h1>

    <div id="embed_chatbot_container_id"></div>
  </main>

  <script async defer src="https://www.uchat.com.au/js/widget/somluqubkudarep6/embed.js?id=embed_chatbot_container_id"></script>
</body>
</html>
